<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WhatsApp Customizer – Image Manager</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-color: #1a1b26;
                --text-color: #e0e0e0;
                --muted-color: #a0a0a0;
                --accent-color: #10b981;
                --accent-hover: #34d399;
                --danger-color: #dc2626;
                --danger-hover: #ef4444;
                --border-color: #2d2e3b;
                --card-bg: #242530;
                --card-bg-elevated: #2d2e3b;
                --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                --glow: 0 0 8px rgba(16, 185, 129, 0.3);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Inter", sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                min-height: 100vh;
                padding: 24px;
            }

            .page {
                max-width: 1200px;
                margin: 0 auto;
            }

            header.page-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 24px;
                padding-bottom: 16px;
                border-bottom: 1px solid var(--border-color);
            }

            header.page-header h1 {
                font-size: 22px;
                font-weight: 600;
            }

            header.page-header .subtitle {
                color: var(--muted-color);
                font-size: 13px;
                margin-top: 4px;
            }

            .panels {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 24px;
            }

            @media (max-width: 780px) {
                .panels {
                    grid-template-columns: 1fr;
                }
            }

            .panel {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 10px;
                padding: 18px;
            }

            .panel h2 {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted-color);
                margin-bottom: 12px;
            }

            .drop-zone {
                border: 2px dashed var(--border-color);
                border-radius: 8px;
                padding: 28px 16px;
                text-align: center;
                cursor: pointer;
                transition: border-color 0.2s ease, background 0.2s ease;
                color: var(--muted-color);
                font-size: 14px;
            }

            .drop-zone:hover,
            .drop-zone.dragover {
                border-color: var(--accent-color);
                background: rgba(16, 185, 129, 0.06);
                color: var(--text-color);
            }

            .drop-zone strong {
                color: var(--accent-color);
            }

            .drop-hint {
                margin-top: 8px;
                font-size: 12px;
                color: var(--muted-color);
            }

            .url-row {
                display: flex;
                gap: 8px;
            }

            .url-row input[type="url"] {
                flex: 1;
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                color: var(--text-color);
                font-size: 14px;
                padding: 10px 12px;
                outline: none;
                transition: border-color 0.2s;
            }

            .url-row input[type="url"]:focus {
                border-color: var(--accent-color);
            }

            button.primary {
                padding: 10px 16px;
                border: none;
                border-radius: 6px;
                background: var(--accent-color);
                color: #fff;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s ease, box-shadow 0.2s ease;
                white-space: nowrap;
            }

            button.primary:hover:not(:disabled) {
                background: var(--accent-hover);
                box-shadow: var(--glow);
            }

            button.primary:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .status-line {
                margin-top: 10px;
                font-size: 13px;
                min-height: 18px;
            }

            .status-line.info {
                color: var(--muted-color);
            }

            .status-line.success {
                color: var(--accent-color);
            }

            .status-line.error {
                color: var(--danger-hover);
            }

            .library {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 10px;
                padding: 18px;
            }

            .library-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 16px;
            }

            .library-header h2 {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted-color);
            }

            .library-tools {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            .filter-btn {
                padding: 6px 12px;
                border-radius: 6px;
                border: 1px solid var(--border-color);
                background: var(--card-bg-elevated);
                color: var(--text-color);
                font-size: 12px;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .filter-btn:hover {
                border-color: var(--accent-color);
            }

            .filter-btn.active {
                background: var(--accent-color);
                border-color: var(--accent-color);
                color: #fff;
            }

            .library-count {
                font-size: 12px;
                color: var(--muted-color);
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .gallery-empty {
                grid-column: 1 / -1;
                text-align: center;
                padding: 40px 20px;
                color: var(--muted-color);
                font-size: 14px;
            }

            .img-card {
                position: relative;
                aspect-ratio: 1 / 1;
                border: 2px solid var(--border-color);
                border-radius: 8px;
                overflow: hidden;
                background: var(--bg-color);
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

            .img-card:hover {
                border-color: var(--accent-color);
                box-shadow: var(--glow);
            }

            .img-card.disabled {
                opacity: 0.4;
                filter: grayscale(0.6);
            }

            .img-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .img-badge {
                position: absolute;
                top: 6px;
                left: 6px;
                background: rgba(0, 0, 0, 0.65);
                color: #fff;
                font-size: 10px;
                padding: 2px 6px;
                border-radius: 4px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .img-badge.url {
                background: rgba(16, 185, 129, 0.8);
            }

            .img-badge.upload {
                background: rgba(59, 130, 246, 0.8);
            }

            .img-card-action {
                position: absolute;
                top: 6px;
                right: 6px;
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                border: none;
                background: rgba(0, 0, 0, 0.65);
                color: #fff;
                font-size: 14px;
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.2s ease, background 0.2s ease,
                    transform 0.2s ease;
            }

            .img-card:hover .img-card-action {
                opacity: 1;
            }

            .img-card-action.delete:hover {
                background: var(--danger-color);
                transform: scale(1.1);
            }

            .img-card-action.restore {
                opacity: 1;
                background: rgba(16, 185, 129, 0.85);
                width: auto;
                padding: 2px 8px;
                border-radius: 12px;
                font-size: 11px;
            }

            .img-card-action.restore:hover {
                background: var(--accent-hover);
            }

            .toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
                background: var(--card-bg-elevated);
                color: var(--text-color);
                padding: 12px 18px;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                box-shadow: var(--shadow);
                font-size: 14px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease, transform 0.25s ease;
                z-index: 100;
            }

            .toast.visible {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .toast.success {
                border-color: var(--accent-color);
            }

            .toast.error {
                border-color: var(--danger-color);
            }

            .spinner {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid rgba(255, 255, 255, 0.25);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
                vertical-align: middle;
                margin-right: 6px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                color: var(--muted-color);
                text-decoration: none;
                font-size: 13px;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
            }

            .back-link:hover {
                color: var(--accent-color);
            }
            #paste-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
        </style>
    </head>

    <body>
        <div class="page">
            <header class="page-header">
                <div>
                    <h1>Image Manager</h1>
                    <div class="subtitle">
                        Upload, add via URL, and manage backgrounds used by
                        WhatsApp Web Customizer.
                    </div>
                </div>
            </header>

            <div class="panels">
                <div class="panel">
                    <h2>Upload from Device</h2>
                    <div class="drop-zone" id="drop-zone" tabindex="0">
                        <div>
                            Drop images here or
                            <strong>click to browse</strong>
                        </div>
                        <div class="drop-hint">
                            JPG, PNG, WEBP, GIF — up to 8 MB each
                        </div>
                    </div>
                    <input
                        type="file"
                        id="file-input"
                        accept="image/jpeg,image/png,image/webp,image/gif"
                        multiple
                        style="display: none"
                    />
                    <div class="status-line info" id="upload-status"></div>
                </div>

                <div class="panel">
                    <h2>Add via URL</h2>
                    <div class="url-row">
                        <input
                            type="url"
                            id="url-input"
                            placeholder="https://example.com/image.jpg"
                        />
                        <button class="primary" id="url-add-btn">Add</button>
                        <button class="primary" id="paste-btn" title="Paste from clipboard">
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
    >
        <path d="M9 2h6"></path>
        <path d="M9 2a3 3 0 0 0-3 3v1h12V5a3 3 0 0 0-3-3"></path>
        <rect x="5" y="4" width="14" height="18" rx="2"></rect>
    </svg>
</button>
                    </div>
                    <div class="status-line info" id="url-status"></div>
                </div>
            </div>

            <section class="library">
                <div class="library-header">
                    <div>
                        <h2>Image Library</h2>
                        <div class="library-count" id="library-count"></div>
                    </div>
                    <div class="library-tools">
                        <button class="filter-btn active" data-filter="all">
                            All
                        </button>
                        <button class="filter-btn" data-filter="predefined">
                            Predefined
                        </button>
                        <button class="filter-btn" data-filter="upload">
                            Uploaded
                        </button>
                        <button class="filter-btn" data-filter="url">
                            From URL
                        </button>
                        <button class="filter-btn" data-filter="disabled">
                            Disabled
                        </button>
                    </div>
                </div>
                <div class="gallery" id="gallery"></div>
            </section>
        </div>

        <div class="toast" id="toast"></div>

        <script src="track.js" defer></script>
        <script src="manage-images.js" defer></script>
    </body>
</html>
