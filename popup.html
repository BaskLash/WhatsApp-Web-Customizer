<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WhatsApp Customizer</title>
        <meta name="name" content="WhatsApp Web Customizer – Ultimate WhatsApp Personalizer Extension" />
        <meta
            name="description"
            content="Take full control of WhatsApp Web. Customize themes, fonts, colors, backgrounds, and more with the #1 WhatsApp Web customization Chrome extension. 100% Open Source."
        />
        <meta
            name="keywords"
            content="WhatsApp Web, Customize WhatsApp, WhatsApp Chrome Extension, WhatsApp Web themes, WhatsApp Web backgrounds, WhatsApp Web font changer, hide WhatsApp features, personalize WhatsApp Web"
        />
        <script src="fontFamilyChange.js" defer></script>
        <script src="popup.js" defer></script>
        <script src="fontSizeChange.js" defer></script>
        <script src="imageSelection.js" defer></script>
        <script src="quick-replies.js" defer></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-color: #1a1b26;
                --text-color: #e0e0e0;
                --accent-color: #10b981;
                --accent-hover: #34d399;
                --border-color: #2d2e3b;
                --card-bg: #242530;
                --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                --glow: 0 0 8px rgba(16, 185, 129, 0.3);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Inter", sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                width: 700px;
                height: 600px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            h1 {
                font-size: 24px;
                font-weight: 600;
                padding: 20px;
                background: linear-gradient(180deg, var(--card-bg), var(--bg-color));
                border-bottom: 1px solid var(--border-color);
                text-align: center;
            }

            .container {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            .left-panel,
            .middle-panel,
            .right-panel {
                padding: 20px;
                overflow-y: auto;
                border-right: 1px solid var(--border-color);
            }

            .left-panel {
                flex: 1;
            }

            .middle-panel {
                flex: 1.5;
            }

            .right-panel {
                flex: 1;
                border-right: none;
            }

            h3 {
                font-size: 14px;
                font-weight: 500;
                text-transform: uppercase;
                color: #a0a0a0;
                margin-bottom: 15px;
                letter-spacing: 0.5px;
            }

            .section {
                margin-bottom: 25px;
            }

            .image-selector,
            .image-option {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                cursor: pointer;
            }

            .image-option {
                width: 100px;
                height: 100px;
                border: 2px solid var(--border-color);
                border-radius: 8px;
                overflow: hidden;
                transition: all 0.3s ease;
            }

            .image-option:hover {
                border-color: var(--accent-color);
                box-shadow: var(--glow);
            }

            .image-option.selected {
                border-color: var(--accent-color);
                box-shadow: var(--glow);
            }

            .image-option img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .preview-image {
                width: 100%;
                max-height: 100px;
                object-fit: cover;
                border-radius: 8px;
            }

            /* Upload Button */
            #modal-upload {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                background: var(--accent-color);
                color: #fff;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            #modal-upload:hover {
                background: var(--accent-hover);
                box-shadow: var(--glow);
            }

            /* Checkbox Styles */
            label {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                border-radius: 6px;
                transition: background-color 0.2s ease;
                cursor: pointer;
            }

            label:hover {
                background-color: rgba(255, 255, 255, 0.05);
            }

            input[type="checkbox"] {
                appearance: none;
                width: 18px;
                height: 18px;
                margin-right: 10px;
                border: 2px solid var(--border-color);
                border-radius: 4px;
                background-color: transparent;
                transition: all 0.2s ease;
                position: relative;
            }

            input[type="checkbox"]:checked {
                background-color: var(--accent-color);
                border-color: var(--accent-color);
            }

            input[type="checkbox"]:checked::after {
                content: "";
                position: absolute;
                left: 5px;
                top: 1px;
                width: 5px;
                height: 10px;
                border: solid #fff;
                border-width: 0 2px 2px 0;
                transform: rotate(45deg);
            }

            label span {
                font-size: 14px;
                font-weight: 400;
            }

            /* Font and Color Selectors */
            select,
            button,
            input[type="color"] {
                width: 100%;
                padding: 10px;
                border-radius: 6px;
                border: 1px solid var(--border-color);
                background: var(--card-bg);
                color: var(--text-color);
                font-size: 14px;
                transition: all 0.3s ease;
                margin-bottom: 12px;
            }

            select:focus,
            button:hover {
                border-color: var(--accent-color);
                box-shadow: var(--glow);
            }

            input[type="color"] {
                height: 40px;
                padding: 4px;
            }

            /* Social Links and Donation Button */
            .social-links {
                display: flex;
                gap: 12px;
                margin-top: 20px;
                justify-content: center;
                align-items: center;
            }

            .social-links a,
            .donation-button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--card-bg);
                color: var(--text-color);
                text-decoration: none;
                transition: all 0.3s ease;
                border: 1px solid var(--border-color);
            }

            .social-links a svg,
            .donation-button svg {
                width: 24px;
                height: 24px;
                display: block;
                margin: auto;
                /* Center SVG within the container */
            }

            .social-links a:hover,
            .donation-button:hover {
                background: var(--accent-color);
                color: #fff;
                box-shadow: var(--glow);
                transform: translateY(-2px);
            }

            .social-links a:hover svg {
                stroke: #fff;
                /* Ensure GitHub SVG stroke turns white on hover */
            }

            .donation-button svg {
                fill: #ffc107;
                /* Default yellow for BuyMeACoffee */
            }

            .donation-button:hover svg {
                fill: #fff;
                /* White fill on hover for BuyMeACoffee */
            }

            #feature-request,
            #report-bug {
                cursor: pointer;
            }

            .image-option {
                position: relative;
            }

            .delete-btn {
                position: absolute;
                top: 5px;
                right: 5px;
                background: rgba(220, 38, 38, 0.9);
                /* Rot */
                color: white;
                border: none;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                cursor: pointer;
                opacity: 0;
                transition: transform 0.2s;
                /* Animation */
            }

            .image-option:hover .delete-btn {
                opacity: 1;
            }

            .delete-btn:hover {
                transform: scale(1.5);
            }

            /* Modal Styles */
            #image-modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.8);
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }

            #image-modal .modal-content {
                background: var(--card-bg);
                padding: 24px;
                border-radius: 12px;
                max-width: 600px;
                max-height: 80vh;
                display: flex;
                flex-direction: column;
                box-shadow: var(--shadow);
            }

            #modal-gallery {
                flex: 1;
                max-height: 400px;
                /* Fixed height for scrolling */
                overflow-y: auto;
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 15px;
            }

            #modal-gallery .image-option {
                width: 100px;
                height: 100px;
            }

            .modal-buttons {
                margin-top: 20px;
                display: flex;
                gap: 12px;
                position: sticky;
                bottom: 0;
                background: var(--card-bg);
                padding: 10px 0;
            }

            .modal-buttons button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                background: var(--accent-color);
                color: #fff;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .modal-buttons button:hover {
                background: var(--accent-hover);
                box-shadow: var(--glow);
            }

            .scale-container {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 5px 0;
            }

            .scale-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            #scale-value {
                font-weight: bold;
                color: #00a884;
            }

            #reset-scale {
                background: #444;
                color: white;
                border: none;
                padding: 4px 10px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
                transition: background 0.2s;
            }

            #reset-scale:hover {
                background: #666;
            }
            .section-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 10px;
            }

            .color-pair {
                display: flex;
                gap: 12px;
                margin-bottom: 12px;
            }

            .color-pair-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .color-pair-label {
                font-size: 11px;
                color: #a0a0a0;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .color-pair-item input[type="color"] {
                width: 100%;
                height: 40px;
                padding: 4px;
                margin-bottom: 0;
            }

            /* Quick Replies Editor */
            #qr-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 10px;
                max-height: 180px;
                overflow-y: auto;
            }

            .qr-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                padding: 6px 10px;
                gap: 8px;
            }

            .qr-text {
                flex: 1;
                font-size: 13px;
                color: var(--text-color);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .qr-edit-input {
                flex: 1;
                background: var(--bg-color);
                border: 1px solid var(--accent-color);
                border-radius: 4px;
                color: var(--text-color);
                font-size: 13px;
                padding: 2px 6px;
                outline: none;
                width: 0;
            }

            .qr-actions {
                display: flex;
                gap: 4px;
                flex-shrink: 0;
            }

            .qr-btn {
                width: auto !important;
                padding: 3px 7px !important;
                font-size: 12px !important;
                margin-bottom: 0 !important;
                border: none !important;
                border-radius: 4px !important;
                cursor: pointer;
                background: var(--card-bg) !important;
                color: var(--text-color) !important;
                transition: background 0.2s !important;
            }

            .qr-btn:hover {
                background: var(--accent-color) !important;
                color: #fff !important;
                box-shadow: none !important;
            }

            .qr-delete-btn:hover {
                background: #dc2626 !important;
            }

            .qr-add-row {
                display: flex;
                gap: 8px;
            }

            #qr-new-input {
                flex: 1;
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                color: var(--text-color);
                font-size: 13px;
                padding: 8px 10px;
                outline: none;
                transition: border-color 0.2s;
                width: 0;
            }

            #qr-new-input:focus {
                border-color: var(--accent-color);
            }

            #qr-add-btn {
                width: auto !important;
                padding: 8px 14px !important;
                margin-bottom: 0 !important;
                background: var(--accent-color) !important;
                color: #fff !important;
                border: none !important;
                border-radius: 6px !important;
                font-size: 13px !important;
                font-weight: 500 !important;
                cursor: pointer;
                white-space: nowrap;
            }

            #qr-add-btn:hover {
                background: var(--accent-hover) !important;
                box-shadow: var(--glow) !important;
            }
        </style>
    </head>

    <body>
        <h1>WhatsApp Customizer</h1>
        <div class="container">

                </div>

                <div class="section">
                    <div class="section-header">
                        <h3>Change Font Size</h3>
                    </div>

                    <div class="scale-container">
                        <input type="range" id="font-scale-slider" min="0.5" max="1.5" step="0.05" value="1" />

                        <div class="scale-footer">
                            <input type="number" id="scale-percent-input" min="50" max="150" step="1" value="100" />
                            <span>%</span>

                            <button id="reset-scale" title="Reset to 100%">Reset</button>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h3>Color Selection</h3>
                    <div class="color-pair">
                        <div class="color-pair-item">
                            <span class="color-pair-label">Incoming</span>
                            <input type="color" id="colorIn" value="#00aaff" />
                        </div>
                        <div class="color-pair-item">
                            <span class="color-pair-label">Outgoing</span>
                            <input type="color" id="colorOut" value="#00ff88" />
                        </div>
                    </div>
                    <button type="button" id="discoButton">Disco Color</button>
                    <button type="button" id="discoButton2">Bang Bang Color</button>
                    <button type="button" id="discoButton3">Reset Color</button>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div id="image-modal">
            <div class="modal-content">
                <h3 id="modal-title">Image Selection</h3>
                <div id="modal-gallery"></div>
                <div class="modal-buttons">
                    <button id="modal-upload">Upload Image</button>
                    <input type="file" id="image-upload-input" accept="image/*" style="display: none" />
                    <button id="modal-save">Save</button>
                    <button id="modal-none">No Image</button>
                    <button id="modal-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </body>
</html>
