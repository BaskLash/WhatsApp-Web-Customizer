<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cw-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0E2A"/>
      <stop offset="100%" stop-color="#15182E"/>
    </linearGradient>
    <linearGradient id="cw-desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3A2418"/>
      <stop offset="100%" stop-color="#2A1810"/>
    </linearGradient>
    <radialGradient id="cw-glow" cx="88%" cy="78%" r="50%">
      <stop offset="0%"  stop-color="#FFA94D" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FFA94D" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFA94D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cw-paneRefl" cx="75%" cy="85%" r="65%">
      <stop offset="0%"  stop-color="#FFA94D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFA94D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cw-paneShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="160" height="90" fill="url(#cw-sky)"/>

  <!-- Window panes (sky shows through, then reflections + shadow on top) -->
  <g>
    <rect x="32" y="7"  width="50.5" height="28" fill="url(#cw-paneRefl)"/>
    <rect x="84.5" y="7" width="50.5" height="28" fill="url(#cw-paneRefl)"/>
    <rect x="32" y="36.1" width="50.5" height="26.9" fill="url(#cw-paneRefl)"/>
    <rect x="84.5" y="36.1" width="50.5" height="26.9" fill="url(#cw-paneRefl)"/>
    <rect x="32" y="7"  width="50.5" height="6" fill="url(#cw-paneShadow)"/>
    <rect x="84.5" y="7" width="50.5" height="6" fill="url(#cw-paneShadow)"/>
    <rect x="32" y="36.1" width="50.5" height="6" fill="url(#cw-paneShadow)"/>
    <rect x="84.5" y="36.1" width="50.5" height="6" fill="url(#cw-paneShadow)"/>
  </g>

  <!-- A few static drops on the panes -->
  <g fill="rgba(200, 215, 235, 0.85)">
    <circle cx="46"  cy="20" r="1.6"/>
    <circle cx="58"  cy="14" r="1.2"/>
    <circle cx="72"  cy="28" r="1.8"/>
    <circle cx="100" cy="22" r="1.4"/>
    <circle cx="112" cy="18" r="2.1"/>
    <circle cx="125" cy="30" r="1.6"/>
    <circle cx="50"  cy="48" r="1.4"/>
    <circle cx="68"  cy="55" r="1.7"/>
    <circle cx="98"  cy="50" r="1.9"/>
    <circle cx="118" cy="58" r="1.5"/>
  </g>

  <!-- Window frame: outer border + dividers -->
  <g fill="#3A2418">
    <rect x="32" y="7"  width="103" height="2"/>
    <rect x="32" y="61" width="103" height="2"/>
    <rect x="32" y="7"  width="2"   height="56"/>
    <rect x="133" y="7" width="2"   height="56"/>
    <rect x="83.5" y="7" width="2"  height="56"/>
    <rect x="32" y="35.1" width="103" height="2"/>
  </g>

  <!-- Desk -->
  <rect x="0" y="73" width="160" height="17" fill="url(#cw-desk)"/>

  <!-- Lamp body (stem + shade + bulb) -->
  <g fill="#8B6F3A">
    <rect x="139" y="48" width="2" height="4"/>
    <polygon points="135.5,52 144.5,52 148,62 132,62"/>
  </g>
  <circle cx="140" cy="64" r="1.7" fill="#FFD89B"/>

  <!-- Warm lamp glow over everything -->
  <rect width="160" height="90" fill="url(#cw-glow)"/>
</svg>
