<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="gm-a" cx="80%" cy="15%" r="75%">
      <stop offset="0%"  stop-color="#4A8FE8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4A8FE8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A8FE8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gm-b" cx="20%" cy="20%" r="80%">
      <stop offset="0%"  stop-color="#A45EE5" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A45EE5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A45EE5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gm-c" cx="30%" cy="85%" r="80%">
      <stop offset="0%"  stop-color="#F49AC2" stop-opacity="1"/>
      <stop offset="50%" stop-color="#F49AC2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F49AC2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gm-d" cx="85%" cy="80%" r="75%">
